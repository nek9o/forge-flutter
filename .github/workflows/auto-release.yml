name: Auto Release (CalVer)

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version (CalVer)
        id: calver
        shell: pwsh
        run: |
          # タイムゾーンを日本時間(JST)にして日付を取得
          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById("Tokyo Standard Time")
          $now = [System.TimeZoneInfo]::ConvertTimeFromUtc([System.DateTime]::UtcNow, $tz)
          $date = $now.ToString("yyyy.M.d")

          # 当日の既存タグを取得し、連番を算出
          git fetch --tags --quiet
          $tags = git tag --list "${date}-*"
          $count = 0
          if ($tags) {
            $count = $tags.Count
          }
          $sequence = $count + 1

          $version = "${date}-${sequence}"
          $pub_version = "${date}+${sequence}"

          echo "VERSION=${version}" >> $env:GITHUB_OUTPUT
          echo "PUB_VERSION=${pub_version}" >> $env:GITHUB_OUTPUT
          echo "Generated version: ${version}"

      - name: Setup Flutter
        shell: pwsh
        run: |
          # プリインストールのFlutter(3.44.0)との競合を避けるため、公式アーカイブから直接取得
          $flutterVersion = "3.41.1"
          $flutterUrl = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${flutterVersion}-stable.zip"
          $installDir = "C:\flutter-sdk"

          Write-Host "Flutter SDK ${flutterVersion} をダウンロード中..."
          Invoke-WebRequest -Uri $flutterUrl -OutFile flutter.zip -UseBasicParsing

          Write-Host "展開中..."
          Expand-Archive flutter.zip -DestinationPath $installDir -Force
          Remove-Item flutter.zip

          $flutterRoot = "$installDir\flutter"
          $flutterBin = "$flutterRoot\bin"
          
          # 環境変数 FLUTTER_ROOT を上書き
          echo "FLUTTER_ROOT=$flutterRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          
          # flutter.bat --version を実行して dart-sdk などを初期化
          & "$flutterBin\flutter.bat" --version
          & "$flutterBin\flutter.bat" config --enable-windows-desktop

          # PATH に flutter\bin と dart-sdk\bin を両方追加して最優先にする
          $dartBin = "$flutterRoot\bin\cache\dart-sdk\bin"
          echo $flutterBin | Out-File -FilePath $env:GITHUB_PATH -Append
          echo $dartBin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Update Version Files
        shell: pwsh
        run: |
          $version = "${{ steps.calver.outputs.VERSION }}"
          $pub_version = "${{ steps.calver.outputs.PUB_VERSION }}"

          # pubspec.yaml の更新
          $pubspec = Get-Content pubspec.yaml
          $new_pubspec = $pubspec -replace 'version: .*', "version: $pub_version"
          Set-Content pubspec.yaml $new_pubspec

          # README のバッジ更新 (Shields.io 形式: version-v2026.3.27--1)
          $badge_version = "v" + $version.Replace("-", "--")

          $readme_files = @("README.md", "README.ja.md")
          foreach ($file in $readme_files) {
            if (Test-Path $file) {
              $content = Get-Content $file
              $new_content = $content -replace 'version-v[\d\.]+(?:--\d+)?', "version-$badge_version"
              Set-Content $file $new_content
            }
          }

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows (includes License Generation)
        run: |
          dart run rps build:windows

      - name: Create Zip Archive
        shell: pwsh
        run: |
          $version = "${{ steps.calver.outputs.VERSION }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "build/forge-flutter-${version}.zip"

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and Push
        run: |
          git add .
          git commit -m "chore(release): bump version to ${{ steps.calver.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.VERSION }}
          name: Release ${{ steps.calver.outputs.VERSION }}
          files: build/forge-flutter-${{ steps.calver.outputs.VERSION }}.zip
          generate_release_notes: true
          prerelease: true
